# GoodyOS — nftables kill switch (VPN drop = all traffic stops)
# Used by Ghost; loaded by ghost.sh / systemd
# Only allow traffic out via tunnel interface (e.g. wg-mullvad or tun0)

flush ruleset

table inet filter {
  chain input   { type filter hook input   priority filter; policy drop; }
  chain forward { type filter hook forward priority filter; policy drop; }
  chain output  { type filter hook output  priority filter; policy drop; }
}

# Allow loopback
table inet filter {
  chain input  { iif "lo" accept; }
  chain output { oif "lo" accept; }
}

# Allow established/related
table inet filter {
  chain input  { ct state established,related accept; }
  chain output { ct state established,related accept; }
}

# Allow only via VPN interface (customize interface name for Mullvad)
# When kill switch is active, uncomment and set:
# chain output { oifname "wg-mullvad" accept; }
# chain output { oifname "tun0" accept; }
