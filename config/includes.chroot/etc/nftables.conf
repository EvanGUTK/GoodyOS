# GoodyOS — kernel-level kill switch (nftables)
# When VPN is down, all traffic is dropped. Cannot be bypassed by apps.
# Full ruleset to be completed in Phase 5/6 with Ghost kill_switch.sh

flush ruleset
table inet filter {
	chain input { type filter hook input priority 0; policy drop; }
	chain forward { type filter hook forward priority 0; policy drop; }
	chain output { type filter hook output priority 0; policy accept; }
}
