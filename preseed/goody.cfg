# GoodyOS — preseed / auto-installer answers (Calamares or Debian installer)
# Default install options for goodyos.iso install mode

# Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# User
d-i passwd/user-fullname string GoodyOS User
d-i passwd/username string goody
d-i passwd/user-password password goody
d-i passwd/user-password-again password goody

# Partitioning (optional: use biggest disk, encrypted)
# d-i partman-auto/method string crypto
# d-i partman-auto/choose_recipe select atomic

# Package selection: already in ISO; no additional tasks
# GoodyOS stack is pre-installed in the image
